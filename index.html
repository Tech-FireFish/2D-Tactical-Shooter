<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Breachline 2D</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="Game status">
        <div>
          <p class="eyebrow">Breachline 2D</p>
          <h1 id="levelTitle">Ridge House Entry</h1>
          <label class="level-picker" for="levelSelect">
            <span>Level</span>
            <select id="levelSelect"></select>
          </label>
        </div>
        <div class="status-grid">
          <div>
            <span>Mode</span>
            <strong id="modeLabel">Planning</strong>
          </div>
          <div>
            <span>Clock</span>
            <strong id="clockLabel">00.0</strong>
          </div>
          <div>
            <span>Objective</span>
            <strong id="objectiveLabel">Secure</strong>
          </div>
        </div>
        <div class="actions" aria-label="Game actions">
          <button id="runButton" type="button" title="Toggle pause and execute">Execute</button>
          <button id="restartButton" type="button" title="Restart level">Restart</button>
          <button id="debugButton" type="button" title="Toggle tactical debug overlay">Debug</button>
        </div>
      </section>

      <section class="game-panel">
        <canvas id="game" width="960" height="640" aria-label="Breachline 2D tactical map"></canvas>
        <div id="banner" class="banner hidden" role="status" aria-live="polite">
          <strong id="bannerTitle">Mission Complete</strong>
          <span id="bannerText">Restart to run the plan again.</span>
          <div class="banner-actions" aria-label="Mission result actions">
            <button id="nextLevelButton" type="button">Next Level</button>
            <button id="bannerRestartButton" type="button">Restart</button>
          </div>
        </div>
      </section>
    </main>
    <script src="main.js?v=6"></script>
  </body>
</html>
