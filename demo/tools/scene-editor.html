<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Breachline Scene Editor</title>
    <link rel="stylesheet" href="scene-editor.css">
  </head>
  <body>
    <main class="editor-shell">
      <aside class="palette" aria-label="Resources">
        <h1>Scene Editor</h1>
        <button data-resource="wall" type="button">Wall</button>
        <button data-resource="door" type="button">Door</button>
        <button data-resource="window" type="button">Window</button>
        <button data-resource="label" type="button">Room Label</button>
        <button data-resource="stairs" type="button">Stairs A/B</button>
        <button data-resource="equipmentTable" type="button">Weapon Table</button>
        <button data-resource="paper" type="button">Paper Clue</button>
        <button data-resource="operator" type="button">Operator</button>
        <button data-resource="enemy" type="button">Enemy</button>
        <button data-resource="objective" type="button">Objective</button>
        <button id="downloadLevelButton" type="button">Download Level JSON</button>
      </aside>
      <section class="board-wrap" aria-label="Scene board">
        <canvas id="sceneBoard" width="1200" height="760"></canvas>
      </section>
      <aside class="properties" aria-label="Selected object properties">
        <h2>Properties</h2>
        <div id="propertyPanel" class="property-panel">Select or place an object.</div>
      </aside>
    </main>
    <script src="scene-editor.js"></script>
  </body>
</html>
